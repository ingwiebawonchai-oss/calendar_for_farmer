<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer calendar</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div id="container" style="display: flex;flex-direction: column;">
        <button class="liquid-glass">
            <div id="calendar"></div>
        </button>
        <br>
        <div id="menu" class="liquid-glass2" style="display: flex; gap: 2.3vh; justify-content: center;">
            <button class="green used" onclick="generateCalendar(cmonth, cyear)">&#128197;</button>
            <button class="blue" onclick="searchs()">&#128269;</button>
            <button class="yellow" onclick="credit()">credit</button>
        </div>
    </div>

    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.02 0.02" numOctaves="2" seed="1" result="noise" />
                <feGaussianBlur in="noise" stdDeviation="2" result="blurred" />
                <feDisplacementMap in="SourceGraphic" in2="blurred" scale="200" xChannelSelector="R"
                    yChannelSelector="G" />
            </filter>
        </defs>
    </svg>
</body>

</html>
